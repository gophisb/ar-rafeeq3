<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الرفيق</title>
<link rel="stylesheet" href="./style.css">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#080B09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  .container{max-width:460px;margin:0 auto;padding:16px;}
  .app-header{text-align:center;padding:18px 0 10px;}
  .app-header h1{font-size:1.5rem;margin:0;color:var(--gold);}
  .app-header p{color:var(--muted);font-size:.85rem;margin-top:6px;}

  .infobar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0;}
  .chip{flex:1;display:flex;align-items:center;gap:6px;border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font-size:.8rem;background:var(--card);}
  .chip select{width:100%;border:none;background:transparent;color:var(--text);
    font-family:inherit;font-size:.8rem;}
  .mood-note{text-align:center;color:var(--gold);font-size:.8rem;min-height:1.2em;margin-bottom:6px;}

  .hero-card{
    border:1px solid var(--line);border-radius:20px;padding:26px 20px;
    background:linear-gradient(160deg, var(--card), transparent);
    text-align:center;
  }
  .hero-card .lbl{font-size:.85rem;color:var(--muted);}
  .hero-card .name{font-size:1.6rem;font-weight:800;color:var(--gold);margin:6px 0 2px;}
  .hero-card .time{font-size:2.2rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);}
  .progress-container{height:6px;border-radius:99px;background:rgba(255,255,255,0.08);
    overflow:hidden;margin-top:18px;}
  .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--gold));
    transition:width 1s linear;}
  .hero-card .remain{font-size:.78rem;color:var(--muted);margin-top:10px;}
  .countdown{font-size:1.15rem;font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums;}

  .adhan-strip{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-top:16px;
    border:1px solid var(--line);border-radius:16px;background:var(--card);}
  .adhan-play{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;background:linear-gradient(150deg,var(--gold),#8a6d1a);
    border:none;cursor:pointer;color:#0a0a0a;}
  .adhan-play svg{width:20px;height:20px;fill:#0a0a0a;stroke:none;}
  .adhan-text .t1{font-size:.9rem;font-weight:700;}
  .adhan-text .t2{color:var(--gold);font-size:.85rem;margin-top:2px;font-variant-numeric:tabular-nums;}

  .quicklinks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px;}
  .qlink{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;
    border:1px solid var(--line);border-radius:12px;background:var(--card);
    text-decoration:none;color:var(--muted);font-size:.68rem;}
  .qlink span:first-child{font-size:1.3rem;}
</style>
</head>
<body>

<main id="app" class="app-shell">
  <div class="container">
    <header class="app-header">
      <h1>أهلاً يا رفيق</h1>
      <p id="hijriPill">📅 —</p>
    </header>

    <div class="infobar">
      <div class="chip">📍 <select id="citySelect"></select></div>
    </div>
    <p class="mood-note" id="moodNote"></p>

    <div id="status">جاري تحميل مواقيت الصلاة...</div>

    <section class="hero-card" id="prayerCard" hidden>
      <div class="lbl">الصلاة القادمة</div>
      <div class="name" id="nextName">—</div>
      <div class="time" id="nextTime">—</div>
      <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
      <p class="remain">يتبقى على الأذان</p>
      <div class="countdown" id="countdown">—</div>
    </section>

    <div class="adhan-strip">
      <button class="adhan-play" id="adhanPlayBtn" aria-label="تشغيل الأذان">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <div class="adhan-text">
        <div class="t1">استماع للأذان</div>
        <div class="t2" id="adhanTimeLabel">—</div>
      </div>
    </div>

    <div class="quicklinks">
      <a href="./qibla.html" class="qlink"><span>🧭</span>القبلة</a>
      <a href="./hisnul.html" class="qlink"><span>🤲</span>أدعية</a>
      <a href="./arbaeen.html" class="qlink"><span>📚</span>الحديث</a>
      <a href="./adhkar.html" class="qlink"><span>🌅</span>الأذكار</a>
    </div>
  </div>
</main>

<audio id="adhanAudio" src="./adhan.mp3" preload="none"></audio>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item active"><span>🏠</span>الرئيسية</a>
  <a href="./quran.html" class="nav-item"><span>📖</span>القرآن</a>
  <a href="./prayer.html" class="nav-item"><span>🕌</span>الصلاة</a>
  <a href="./adhkar.html" class="nav-item"><span>🤲</span>الأذكار</a>
  <a href="./more.html" class="nav-item"><span>⚙️</span>المزيد</a>
</nav>

<script src="./theme.js"></script>
<script src="./app.js"></script>
</body>
</html>
