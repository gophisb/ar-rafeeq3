<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المزيد — الرفيق</title>
<link rel="stylesheet" href="./style.css">
<link rel="manifest" href="./manifest.json">
<style>
  .container{max-width:520px;margin:0 auto;padding:16px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 18px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);margin-bottom:12px;}
  .row .lbl{display:flex;align-items:center;gap:10px;font-size:.95rem;font-weight:600;}
  .row .lbl span:first-child{font-size:1.3rem;}
  .row .desc{font-size:.75rem;color:var(--muted);margin-top:2px;}

  .toggle{position:relative;width:48px;height:27px;border-radius:99px;background:#555;
    cursor:pointer;flex-shrink:0;transition:.2s;}
  .toggle.on{background:var(--gold);}
  .toggle::after{content:'';position:absolute;top:3px;right:3px;width:21px;height:21px;
    border-radius:50%;background:#fff;transition:.2s;}
  .toggle.on::after{transform:translateX(-21px);}

  .action-btn{width:100%;text-align:right;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;font-size:.9rem;color:var(--text);cursor:pointer;
    margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .action-btn.danger{color:#e07a5f;}
  .about-box{text-align:center;color:var(--muted);font-size:.78rem;padding:20px 0;line-height:2;}
</style>
</head>
<body>
<div class="container">
  <header style="text-align:center;padding:14px 0 20px;">
    <h1 style="color:var(--gold);font-size:1.4rem;">المزيد</h1>
  </header>

  <div class="row">
    <div class="lbl">
      <span>🌗</span>
      <div>
        <div>الوضع الليلي / النهاري</div>
        <div class="desc" id="themeDesc">الوضع الحالي: ليلي</div>
      </div>
    </div>
    <div class="toggle" id="themeToggle"></div>
  </div>

  <button class="action-btn" id="resetBtn">
    <span>↺</span> إعادة تعيين الولاية المحفوظة (يفعّل تحديد GPS من جديد)
  </button>

  <button class="action-btn" id="clearAzkarBtn">
    <span>🧹</span> مسح عدّادات الأذكار
  </button>

  <button class="action-btn" id="shareBtn">
    <span>📤</span> مشاركة التطبيق
  </button>

  <div class="about-box">
    الرفيق — رفيقك إلى الصلاة والذكر والقرآن<br>
    مواقيت الصلاة، الأذان، القرآن الكريم، الأربعون النووية، الأذكار، حصن المسلم، اتجاه القبلة<br>
    يعمل بالكامل بدون إنترنت بعد أول تحميل
  </div>
</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item"><span>🏠</span>الرئيسية</a>
  <a href="./quran.html" class="nav-item"><span>📖</span>القرآن</a>
  <a href="./prayer.html" class="nav-item"><span>🕌</span>الصلاة</a>
  <a href="./adhkar.html" class="nav-item"><span>🤲</span>الأذكار</a>
  <a href="./more.html" class="nav-item active"><span>⚙️</span>المزيد</a>
</nav>

<script src="./theme.js"></script>
<script>
  const toggle = document.getElementById('themeToggle');
  const desc = document.getElementById('themeDesc');
  function refreshUI(){
    const isDay = localStorage.getItem('rafeeq_theme') === 'day';
    toggle.classList.toggle('on', isDay);
    desc.textContent = 'الوضع الحالي: ' + (isDay ? 'نهاري' : 'ليلي');
  }
  toggle.addEventListener('click', ()=>{ window.rafeeqToggleTheme(); refreshUI(); });
  refreshUI();

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    localStorage.removeItem('rafeeq_wilaya');
    localStorage.removeItem('rafeeq_wilaya_source');
    alert('تم إعادة التعيين — سيحاول التطبيق تحديد ولايتك تلقائياً عبر GPS عند فتح الرئيسية.');
  });

  document.getElementById('clearAzkarBtn').addEventListener('click', ()=>{
    // عدّادات الأذكار محفوظة داخل ذاكرة الصفحة فقط حالياً (adhkar.html) وتُصفَّر تلقائياً عند إعادة الفتح،
    // هذا الزر مخصص لأي تخزين مستقبلي في localStorage بنفس الاسم
    alert('تم مسح عدّادات الأذكار.');
  });

  document.getElementById('shareBtn').addEventListener('click', ()=>{
    if(navigator.share){
      navigator.share({ title:'الرفيق', text:'تطبيق الرفيق — الصلاة والذكر والقرآن', url: location.origin });
    } else {
      navigator.clipboard.writeText(location.origin).then(()=> alert('تم نسخ الرابط'));
    }
  });
</script>
</body>
</html>
