<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القرآن الكريم — الرفيق</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .quran-container { max-width: 460px; margin: 0 auto; padding: 16px; }
        .quran-header { text-align: center; padding: 20px 0; }
        .quran-header h2 { color: var(--gold); font-family: 'Amiri', serif; }
        .search-box { width: 100%; padding: 12px; margin: 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem; }
        .surah-list { list-style: none; padding: 0; }
        .surah-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .surah-item:hover { background: rgba(255,255,255,0.03); }
        .surah-name { color: var(--gold); font-family: 'Amiri', serif; font-size: 1.2rem; }
        .ayah-text { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 2.2; font-family: 'Amiri', serif; font-size: 1.1rem; }
        .ayah-number { color: var(--gold); font-size: 0.8rem; margin-left: 8px; }
        .back-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 99px; margin-bottom: 16px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
        .no-results { text-align: center; padding: 40px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="quran-container">
        <div class="quran-header"><h2>📖 القرآن الكريم</h2></div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن كلمة أو آية...">
        <div id="quranContent"></div>
    </div>
    <script>
        (function() {
            var quranData = null;
            var container = document.getElementById('quranContent');
            var searchInput = document.getElementById('searchInput');

            function normalizeSurahs(data) {
                if (Array.isArray(data) && data.length > 0) {
                    return data.map(function(s) {
                        // هنا كان الخطأ: الحقل اسمه a في ملفك، وليس ayahs
                        var ayahs = [];
                        var rawAyahs = s.ayahs || s.a; // يدعم الحقلين معاً
                        if (Array.isArray(rawAyahs)) {
                            ayahs = rawAyahs.map(function(a) {
                                if (typeof a === 'string') return a;
                                return a.t || a.text || a.verse || a.aya || '';
                            });
                        }
                        return {
                            name: s.name || '',
                            ayahs: ayahs
                        };
                    });
                }
                if (data && typeof data === 'object' && !Array.isArray(data)) {
                    var inner = data.quran || data.surahs || data.surah || data.data || data.suras;
                    if (inner && Array.isArray(inner)) return normalizeSurahs(inner);
                }
                return null;
            }

            function loadQuran() {
                container.innerHTML = '<p class="no-results">جاري تحميل القرآن الكريم...</p>';
                fetch('./quran-local.json')
                    .then(function(r) { return r.json(); })
                    .then(function(raw) {
                        var n = normalizeSurahs(raw);
                        if (!n || n.length === 0) {
                            container.innerHTML = '<p class="no-results">❌ بنية الملف غير مدعومة.</p>';
                            return;
                        }
                        quranData = n;
                        displaySurahList();
                    })
                    .catch(function() {
                        container.innerHTML = '<p class="no-results">❌ فشل تحميل الملف. تأكد من وجود quran-local.json.</p>';
                    });
            }

            function displaySurahList() {
                if (!quranData || quranData.length === 0) {
                    container.innerHTML = '<p class="no-results">لا توجد بيانات.</p>';
                    return;
                }
                var h = '<ul class="surah-list">';
                quranData.forEach(function(s, i) {
                    h += '<li class="surah-item" onclick="window.showSurah(' + i + ')">';
                    h += '<span class="surah-name">' + (i + 1) + '. ' + s.name + '</span>';
                    h += '<span style="color:var(--muted);font-size:0.8rem;">' + s.ayahs.length + ' آيات</span>';
                    h += '</li>';
                });
                h += '</ul>';
                container.innerHTML = h;
            }

            window.showSurah = function(i) {
                var s = quranData[i];
                if (!s) return;
                var h = '<button class="back-btn" onclick="displaySurahList()">← فهرس السور</button>';
                h += '<h2 style="color:var(--gold);text-align:center;margin:16px 0;font-family:Amiri,serif;">' + s.name + '</h2>';
                s.ayahs.forEach(function(txt, j) {
                    h += '<div class="ayah-text"><span class="ayah-number">' + (j + 1) + '</span>' + txt + '</div>';
                });
                container.innerHTML = h;
                window.scrollTo(0, 0);
            };

            searchInput.addEventListener('input', function() {
                var term = this.value.trim();
                if (!term) { displaySurahList(); return; }
                if (!quranData) return;
                var results = '';
                quranData.forEach(function(s) {
                    s.ayahs.forEach(function(txt, j) {
                        if (txt && txt.includes(term)) {
                            results += '<div class="ayah-text"><strong style="color:var(--gold);">' + s.name + ' ' + (j + 1) + ':</strong> ' + txt + '</div>';
                        }
                    });
                });
                container.innerHTML = results || '<p class="no-results">لا توجد نتائج.</p>';
            });

            loadQuran();
        })();
    </script>
</body>
</html>
