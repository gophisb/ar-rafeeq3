<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القرآن الكريم — الرفيق</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .quran-container { max-width: 460px; margin: 0 auto; padding: 16px; }
        .quran-header { text-align: center; padding: 20px 0; }
        .quran-header h2 { color: var(--gold); font-family: 'Amiri', serif; }
        .search-box { width: 100%; padding: 12px; margin: 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem; }
        .search-status { text-align: center; color: var(--muted); font-size: 0.8rem; min-height: 1.2em; margin-bottom: 8px; }
        .surah-list { list-style: none; padding: 0; }
        .surah-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .surah-item:hover { background: rgba(255,255,255,0.03); }
        .surah-name { color: var(--gold); font-family: 'Amiri', serif; font-size: 1.2rem; }
        .ayah-text { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 2.2; font-family: 'Amiri', serif; font-size: 1.1rem; position: relative; }
        .ayah-number { color: var(--gold); font-size: 0.8rem; margin-left: 8px; }
        .tafsir-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 12px; padding: 2px 10px; font-size: 0.7rem; cursor: pointer; margin-right: 8px; vertical-align: middle; }
        .tafsir-box { background: rgba(15, 92, 62, 0.25); border-right: 3px solid var(--gold); padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 0.95rem; line-height: 1.8; color: var(--text); }
        .back-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 99px; margin-bottom: 16px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
        .no-results { text-align: center; padding: 40px; color: var(--muted); }
        .highlight { background: rgba(212,175,55,0.3); padding: 2px 0; }
    </style>
</head>
<body>
    <div class="quran-container">
        <div class="quran-header"><h2>📖 القرآن الكريم</h2></div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن كلمة أو آية...">
        <div class="search-status" id="searchStatus"></div>
        <div id="quranContent"></div>
    </div>
    <script>
        (function() {
            var quranData = null;
            var tafsirData = null;          // سيكون كائن: { "1": { "1": "نص التفسير", "2": "..." }, ... }
            var flatAyahs = [];
            var container = document.getElementById('quranContent');
            var searchInput = document.getElementById('searchInput');
            var searchStatus = document.getElementById('searchStatus');
            var debounceTimer = null;

            function normalizeArabic(text) {
                if (!text) return '';
                return text
                    .replace(/[ًٌٍَُِْـ]/g, '')
                    .replace(/[إأٱآا]/g, 'ا')
                    .replace(/[ؤئ]/g, 'ء')
                    .replace(/ى/g, 'ي')
                    .replace(/ة/g, 'ه');
            }

            // تحميل التفسير
            function loadTafsir() {
                return fetch('./tafsir-saadi.json')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        tafsirData = data;
                        console.log('✅ تم تحميل تفسير السعدي');
                    })
                    .catch(function() {
                        console.warn('⚠️ تفسير السعدي غير متوفر محلياً');
                    });
            }

            function loadQuran() {
                container.innerHTML = '<p class="no-results">جاري تحميل القرآن والتفسير...</p>';
                // تحميل القرآن والتفسير معاً
                Promise.all([
                    fetch('./quran-local.json').then(function(r) { return r.json(); }),
                    loadTafsir()
                ])
                .then(function(results) {
                    var raw = results[0];
                    var surahs = normalizeSurahs(raw);
                    if (!surahs || surahs.length === 0) {
                        container.innerHTML = '<p class="no-results">❌ بنية الملف غير مدعومة.</p>';
                        return;
                    }
                    quranData = surahs;
                    flatAyahs = [];
                    quranData.forEach(function(s, sIdx) {
                        s.ayahs.forEach(function(txt, aIdx) {
                            flatAyahs.push({
                                surahName: s.name,
                                surahIndex: sIdx,
                                ayahNum: aIdx + 1,
                                text: txt,
                                normalized: normalizeArabic(txt)
                            });
                        });
                    });
                    displaySurahList();
                })
                .catch(function() {
                    container.innerHTML = '<p class="no-results">❌ فشل تحميل الملفات.</p>';
                });
            }

            function normalizeSurahs(data) {
                if (Array.isArray(data) && data.length > 0) {
                    return data.map(function(s) {
                        var rawAyahs = s.ayahs || s.a;
                        var ayahs = [];
                        if (Array.isArray(rawAyahs)) {
                            ayahs = rawAyahs.map(function(a) {
                                if (typeof a === 'string') return a;
                                return a.t || a.text || a.verse || a.aya || '';
                            });
                        }
                        return { name: s.name || '', ayahs: ayahs };
                    });
                }
                if (data && typeof data === 'object' && !Array.isArray(data)) {
                    var inner = data.quran || data.surahs || data.surah || data.data || data.suras;
                    if (inner && Array.isArray(inner)) return normalizeSurahs(inner);
                }
                return null;
            }

            function displaySurahList() {
                if (!quranData) return;
                searchStatus.textContent = '';
                var h = '<ul class="surah-list">';
                quranData.forEach(function(s, i) {
                    h += '<li class="surah-item" onclick="window.showSurah(' + i + ')">';
                    h += '<span class="surah-name">' + (i + 1) + '. ' + s.name + '</span>';
                    h += '<span style="color:var(--muted);font-size:0.8rem;">' + s.ayahs.length + ' آيات</span>';
                    h += '</li>';
                });
                h += '</ul>';
                container.innerHTML = h;
            }

            // عرض سورة مع أزرار التفسير
            window.showSurah = function(index) {
                var s = quranData[index];
                if (!s) return;
                searchStatus.textContent = '';
                var h = '<button class="back-btn" onclick="displaySurahList()">← فهرس السور</button>';
                h += '<h2 style="color:var(--gold);text-align:center;margin:16px 0;font-family:Amiri,serif;">' + s.name + '</h2>';
                s.ayahs.forEach(function(txt, j) {
                    var surahNum = index + 1;
                    var ayahNum = j + 1;
                    h += '<div class="ayah-text" id="ayah-' + surahNum + '-' + ayahNum + '">';
                    h += '<span class="ayah-number">' + ayahNum + '</span>';
                    h += txt;
                    // زر التفسير
                    h += ' <button class="tafsir-btn" onclick="window.toggleTafsir(' + surahNum + ',' + ayahNum + ')">تفسير</button>';
                    h += '<div id="tafsir-' + surahNum + '-' + ayahNum + '" style="display:none;"></div>';
                    h += '</div>';
                });
                container.innerHTML = h;
                window.scrollTo(0, 0);
            };

            // إظهار/إخفاء التفسير
            window.toggleTafsir = function(surah, ayah) {
                var box = document.getElementById('tafsir-' + surah + '-' + ayah);
                if (!box) return;
                if (box.style.display === 'none' || box.style.display === '') {
                    if (!tafsirData || !tafsirData[surah] || !tafsirData[surah][ayah]) {
                        box.innerHTML = '<div class="tafsir-box">التفسير غير متوفر لهذه الآية.</div>';
                    } else {
                        box.innerHTML = '<div class="tafsir-box">' + tafsirData[surah][ayah] + '</div>';
                    }
                    box.style.display = 'block';
                } else {
                    box.style.display = 'none';
                }
            };

            function performSearch(term) {
                if (!quranData) return;
                if (!term) {
                    displaySurahList();
                    return;
                }
                var normalizedTerm = normalizeArabic(term);
                var results = [];
                var count = 0;
                for (var i = 0; i < flatAyahs.length; i++) {
                    var item = flatAyahs[i];
                    if (item.normalized.indexOf(normalizedTerm) !== -1) {
                        count++;
                        var highlighted = item.text.replace(
                            new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'),
                            '<span class="highlight">$1</span>'
                        );
                        results.push(
                            '<div class="ayah-text">' +
                            '<strong style="color:var(--gold);">' + item.surahName + ' ' + item.ayahNum + ':</strong> ' +
                            highlighted +
                            ' <button class="tafsir-btn" onclick="window.toggleTafsir(' + (item.surahIndex + 1) + ',' + item.ayahNum + ')">تفسير</button>' +
                            '<div id="tafsir-' + (item.surahIndex + 1) + '-' + item.ayahNum + '" style="display:none;"></div>' +
                            '</div>'
                        );
                    }
                }
                container.innerHTML = results.length > 0 ? results.join('') : '<p class="no-results">لا توجد نتائج مطابقة.</p>';
                searchStatus.textContent = count > 0 ? 'تم العثور على ' + count + ' نتيجة' : '';
            }

            searchInput.addEventListener('input', function() {
                var term = this.value.trim();
                if (debounceTimer) clearTimeout(debounceTimer);
                if (!term) {
                    displaySurahList();
                    searchStatus.textContent = '';
                    return;
                }
                searchStatus.textContent = '...';
                debounceTimer = setTimeout(function() {
                    performSearch(term);
                }, 250);
            });

            loadQuran();
        })();
    </script>
</body>
</html>
