<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القرآن الكريم — الرفيق</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .quran-container { max-width: 460px; margin: 0 auto; padding: 16px; }
        .quran-header { text-align: center; padding: 20px 0; }
        .quran-header h2 { color: var(--gold); font-family: 'Amiri', serif; }
        .search-box { width: 100%; padding: 12px; margin: 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem; }
        .surah-list { list-style: none; padding: 0; }
        .surah-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .surah-item:hover { background: rgba(255,255,255,0.03); }
        .surah-name { color: var(--gold); font-family: 'Amiri', serif; font-size: 1.2rem; }
        .ayah-text { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 2.2; font-family: 'Amiri', serif; font-size: 1.1rem; }
        .ayah-number { color: var(--gold); font-size: 0.8rem; margin-left: 8px; }
        .back-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 99px; margin-bottom: 16px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
        .no-results { text-align: center; padding: 40px; color: var(--muted); }
        .debug-info { background: rgba(255,255,0,0.1); padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>
<body>
    <div class="quran-container">
        <div class="quran-header">
            <h2>📖 القرآن الكريم</h2>
        </div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن كلمة أو آية...">
        <div id="quranContent"></div>
    </div>
    <script>
        (function() {
            var quranData = null;
            var container = document.getElementById('quranContent');
            var searchInput = document.getElementById('searchInput');

            function normalizeSurahs(data) {
                // الحالة 1: مصفوفة سور (الأكثر شيوعًا)
                if (Array.isArray(data) && data.length > 0) {
                    return data.map(function(s) {
                        return {
                            name: s.name || s.transliteration || 'سورة',
                            ayahs: Array.isArray(s.ayahs) ? s.ayahs.map(function(a) {
                                return typeof a === 'string' ? a : (a.text || a.t || a.verse || '');
                            }) : []
                        };
                    });
                }
                // الحالة 2: كائن يحتوي على مصفوفة داخله
                if (data && typeof data === 'object') {
                    var surahsArray = data.surahs || data.surah || data.data || data.quran;
                    if (Array.isArray(surahsArray)) {
                        return normalizeSurahs(surahsArray);
                    }
                }
                // الحالة 3: كائن مفاتيحه أرقام السور
                if (data && typeof data === 'object' && !Array.isArray(data)) {
                    var keys = Object.keys(data);
                    if (keys.length > 0 && !isNaN(parseInt(keys[0]))) {
                        var arr = [];
                        for (var i = 1; i <= 114; i++) {
                            if (data[i]) arr.push(data[i]);
                        }
                        if (arr.length > 0) return normalizeSurahs(arr);
                    }
                }
                return null;
            }

            function loadQuran() {
                container.innerHTML = '<p class="no-results">جاري تحميل القرآن الكريم...</p>';
                fetch('./quran-local.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return response.json();
                    })
                    .then(function(raw) {
                        var normalized = normalizeSurahs(raw);
                        if (!normalized || normalized.length === 0) {
                            showDebugInfo(raw);
                            throw new Error('لم يتم التعرف على بنية JSON');
                        }
                        quranData = normalized;
                        displaySurahList();
                    })
                    .catch(function(err) {
                        container.innerHTML = '<p class="no-results">❌ فشل تحميل القرآن. تأكد من وجود ملف quran-local.json.</p>';
                        console.error('خطأ في تحميل القرآن:', err);
                    });
            }

            function showDebugInfo(raw) {
                var sample = JSON.stringify(raw).substring(0, 200);
                container.innerHTML += '<div class="debug-info">تم تحميل الملف لكن بنيته غير مدعومة. البداية: ' + sample + '...</div>';
            }

            function displaySurahList() {
                if (!quranData || quranData.length === 0) {
                    container.innerHTML = '<p class="no-results">لا توجد بيانات قرآنية.</p>';
                    return;
                }
                var html = '<ul class="surah-list">';
                quranData.forEach(function(surah, index) {
                    html += '<li class="surah-item" onclick="window.showSurah(' + index + ')">';
                    html += '<span class="surah-name">' + (index + 1) + '. ' + surah.name + '</span>';
                    html += '<span style="color:var(--muted);font-size:0.8rem;">' + surah.ayahs.length + ' آيات</span>';
                    html += '</li>';
                });
                html += '</ul>';
                container.innerHTML = html;
            }

            window.showSurah = function(index) {
                var surah = quranData[index];
                if (!surah) return;
                var html = '<button class="back-btn" onclick="displaySurahList()">← فهرس السور</button>';
                html += '<h2 style="color:var(--gold);text-align:center;margin:16px 0;font-family:Amiri,serif;">' + surah.name + '</h2>';
                surah.ayahs.forEach(function(ayahText, i) {
                    html += '<div class="ayah-text">';
                    html += '<span class="ayah-number">' + (i + 1) + '</span>';
                    html += ayahText;
                    html += '</div>';
                });
                container.innerHTML = html;
                window.scrollTo(0, 0);
            };

            searchInput.addEventListener('input', function() {
                var term = this.value.trim();
                if (!term) {
                    displaySurahList();
                    return;
                }
                if (!quranData) return;
                var results = '';
                quranData.forEach(function(surah, sIdx) {
                    surah.ayahs.forEach(function(ayahText, aIdx) {
                        if (ayahText && ayahText.includes(term)) {
                            results += '<div class="ayah-text">';
                            results += '<strong style="color:var(--gold);">' + surah.name + ' ' + (aIdx + 1) + ':</strong> ';
                            results += ayahText;
                            results += '</div>';
                        }
                    });
                });
                container.innerHTML = results || '<p class="no-results">لا توجد نتائج مطابقة.</p>';
            });

            loadQuran();
        })();
    </script>
</body>
</html>
