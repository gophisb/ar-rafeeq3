<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفسير السعدي — الرفيق</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .tafsir-container { max-width: 460px; margin: 0 auto; padding: 16px; }
        .tafsir-header { text-align: center; padding: 20px 0; }
        .tafsir-header h2 { color: var(--gold); font-family: 'Amiri', serif; }
        .search-box { width: 100%; padding: 12px; margin: 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem; }
        .tafsir-entry { padding: 16px; margin-bottom: 16px; background: rgba(15, 92, 62, 0.25); border-right: 3px solid var(--gold); border-radius: 8px; }
        .tafsir-entry h3 { color: var(--gold); margin-bottom: 12px; font-family: 'Amiri', serif; font-size: 1.2rem; }
        .tafsir-text { line-height: 2; font-size: 1rem; color: var(--text); }
        .no-results { text-align: center; padding: 40px; color: var(--muted); }
        .pagination { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .pagination button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 99px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div class="tafsir-container">
        <div class="tafsir-header"><h2>📚 تفسير السعدي</h2></div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن آية أو كلمة في التفسير...">
        <div id="tafsirContent"><p class="no-results">جاري تحميل التفسير...</p></div>
    </div>
    <script>
        (function() {
            var tafsirData = null;
            var container = document.getElementById('tafsirContent');
            var searchInput = document.getElementById('searchInput');
            var debounceTimer = null;
            var currentPage = 1;
            var resultsPerPage = 10;

            // تحميل التفسير
            fetch('./tafsir-saadi.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    tafsirData = data;
                    displayAllTafsir();
                })
                .catch(function() {
                    container.innerHTML = '<p class="no-results">❌ فشل تحميل ملف التفسير. تأكد من وجود tafsir-saadi.json.</p>';
                });

            function displayAllTafsir() {
                var results = [];
                for (var surah in tafsirData) {
                    for (var ayah in tafsirData[surah]) {
                        results.push({
                            surah: parseInt(surah),
                            ayah: parseInt(ayah),
                            text: tafsirData[surah][ayah]
                        });
                    }
                }
                renderPage(results);
            }

            function performSearch(term) {
                if (!term) {
                    displayAllTafsir();
                    return;
                }
                var results = [];
                for (var surah in tafsirData) {
                    for (var ayah in tafsirData[surah]) {
                        var text = tafsirData[surah][ayah];
                        if (text.includes(term)) {
                            results.push({ surah: parseInt(surah), ayah: parseInt(ayah), text: text });
                        }
                    }
                }
                renderPage(results);
            }

            function renderPage(results) {
                var start = (currentPage - 1) * resultsPerPage;
                var end = start + resultsPerPage;
                var pageResults = results.slice(start, end);
                var totalPages = Math.ceil(results.length / resultsPerPage);

                var html = '';
                if (pageResults.length === 0) {
                    html = '<p class="no-results">لا توجد نتائج.</p>';
                } else {
                    pageResults.forEach(function(item) {
                        html += '<div class="tafsir-entry">';
                        html += '<h3>سورة ' + item.surah + ' — آية ' + item.ayah + '</h3>';
                        html += '<div class="tafsir-text">' + item.text + '</div>';
                        html += '</div>';
                    });
                    if (totalPages > 1) {
                        html += '<div class="pagination">';
                        if (currentPage > 1) {
                            html += '<button onclick="changePage(' + (currentPage - 1) + ')">السابق</button>';
                        }
                        html += '<span style="color:var(--muted);">' + currentPage + ' / ' + totalPages + '</span>';
                        if (currentPage < totalPages) {
                            html += '<button onclick="changePage(' + (currentPage + 1) + ')">التالي</button>';
                        }
                        html += '</div>';
                    }
                }
                container.innerHTML = html;
            }

            window.changePage = function(page) {
                currentPage = page;
                var term = searchInput.value.trim();
                if (term) {
                    performSearch(term);
                } else {
                    displayAllTafsir();
                }
                window.scrollTo(0, 0);
            };

            searchInput.addEventListener('input', function() {
                var term = this.value.trim();
                if (debounceTimer) clearTimeout(debounceTimer);
                currentPage = 1;
                debounceTimer = setTimeout(function() {
                    performSearch(term);
                }, 300);
            });
        })();
    </script>
</body>
</html>
