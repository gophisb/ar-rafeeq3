<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفسير السعدي — الرفيق</title>
<link rel="stylesheet" href="./style.css">
<script src="./theme.js"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  .container{max-width:720px;margin:0 auto;padding:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;}
  .back{color:var(--primary);text-decoration:none;font-size:14px;font-weight:600;}
  h1{text-align:center;font-size:26px;color:var(--primary);margin:6px 0 2px;}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:18px;}
  .credit-badge{display:block;text-align:center;font-size:12px;color:var(--primary);
    background:var(--card);border:1px solid var(--line);border-radius:99px;padding:4px 12px;
    width:fit-content;margin:8px auto 18px;}

  .surah-row{display:flex;align-items:center;gap:14px;padding:15px 16px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;
    cursor:pointer;text-decoration:none;color:inherit;}
  .surah-num{flex-shrink:0;width:34px;height:34px;border-radius:10px;
    background:linear-gradient(155deg,var(--primary),var(--primary-dark));color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
  .surah-name{flex:1;font-family:'Amiri',serif;font-size:19px;font-weight:700;color:var(--text);}
  .chev{color:var(--muted);font-size:14px;}

  .reader{display:none;}
  .reader.open{display:block;}
  .reader-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .reader-head button{background:var(--card);border:1px solid var(--line);color:var(--primary);
    border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;}
  .reader-title{font-family:'Amiri',serif;font-size:26px;color:var(--gold);text-align:center;margin-bottom:16px;}
  .tafsir-text{font-size:17px;line-height:2.3;color:var(--text);background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:20px;white-space:pre-line;}
  .tafsir-text b{color:var(--gold);}

  #status{text-align:center;color:var(--muted);padding:40px 0;}
  footer{text-align:center;padding:24px 0 10px;color:var(--muted);font-size:12px;line-height:1.7;}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a class="back" href="./index.html">→ الرئيسية</a>
    <span style="font-size:22px;">📚</span>
  </div>
  <h1>تفسير السعدي</h1>
  <p class="sub">تيسير الكريم الرحمن في تفسير كلام المنان</p>
  <div class="credit-badge">📖 الشيخ عبد الرحمن بن ناصر السعدي رحمه الله</div>

  <div id="status">جاري تحميل التفسير...</div>

  <div id="surahList"></div>

  <div class="reader" id="reader">
    <div class="reader-head">
      <button id="backToList">→ فهرس السور</button>
      <div></div>
    </div>
    <div class="reader-title" id="readerTitle">—</div>
    <div class="tafsir-text" id="tafsirText"></div>
  </div>

  <footer>الرفيق — تفسير السعدي كاملاً بدون إنترنت</footer>
</div>

<script>
let SURAH_NAMES = [];
let TAFSIR = [];

Promise.all([
  fetch('./quran-local.json').then(r => r.json()),
  fetch('./tafsir-saadi.json').then(r => r.json())
]).then(([quran, tafsirData]) => {
  SURAH_NAMES = quran.map(s => s.name);
  TAFSIR = tafsirData.tafsir;
  document.getElementById('status').hidden = true;
  renderList();
}).catch(() => {
  document.getElementById('status').textContent =
    'تعذّر تحميل التفسير. تأكد من وجود quran-local.json و tafsir-saadi.json بجانب هذه الصفحة.';
});

function renderList(){
  const wrap = document.getElementById('surahList');
  wrap.innerHTML = SURAH_NAMES.map((name, i) => `
    <a class="surah-row" data-i="${i}">
      <div class="surah-num">${i+1}</div>
      <div class="surah-name">${name}</div>
      <div class="chev">‹</div>
    </a>
  `).join('');
  wrap.querySelectorAll('.surah-row').forEach(row=>{
    row.addEventListener('click', () => openSurah(parseInt(row.dataset.i, 10)));
  });
}

function openSurah(i){
  document.getElementById('surahList').style.display = 'none';
  document.getElementById('reader').classList.add('open');
  document.getElementById('readerTitle').textContent = `سورة ${SURAH_NAMES[i]}`;
  document.getElementById('tafsirText').textContent = TAFSIR[i] || 'لا يتوفر تفسير لهذه السورة.';
  window.scrollTo(0,0);
}

document.getElementById('backToList').addEventListener('click', () => {
  document.getElementById('reader').classList.remove('open');
  document.getElementById('surahList').style.display = '';
});
</script>
</body>
</html>
