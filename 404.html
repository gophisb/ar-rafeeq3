<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة — الرفيق</title>
<link rel="stylesheet" href="./style.css">
<script src="./theme.js"></script>
<style>
  .notfound{
    min-height:80dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .notfound .icon{font-size:64px;margin-bottom:16px;}
  .notfound h1{font-size:1.6rem;color:var(--gold);margin-bottom:8px;}
  .notfound p{color:var(--muted);font-size:.9rem;max-width:320px;line-height:1.8;margin-bottom:24px;}
  .notfound a{
    background:linear-gradient(150deg,var(--gold),#8a6d1a);color:#0a0a0a;
    text-decoration:none;font-weight:700;padding:12px 28px;border-radius:99px;font-size:.9rem;
  }
</style>
</head>
<body>
  <div class="notfound">
    <div class="icon">🕌</div>
    <h1>هذه الصفحة غير موجودة</h1>
    <p>يبدو أنك اتّبعت رابطًا غير صحيح، أو أن الصفحة نُقلت. تفقّد الرابط، أو عد إلى الصفحة الرئيسية.</p>
    <a href="./index.html">→ العودة إلى الرفيق</a>
  </div>
</body>
</html>
